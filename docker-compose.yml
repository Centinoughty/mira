services:
  postgres:
    image: postgres:16-alpine
    container_name: mira-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - miragres:/var/lib/postgresql/data/

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: mira-client
    command: npm run dev
    env_file:
      - ./client/.env
    depends_on:
      - server
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
  
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: mira-server
    command: npm run dev
    env_file:
      - ./server/.env
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules

volumes:
  miragres:
    name: mira
